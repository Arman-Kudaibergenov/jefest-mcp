[supervisord]
nodaemon=true
logfile=/data/logs/supervisord.log
pidfile=/data/supervisord.pid

[program:rlm]
command=rlm-server --host 0.0.0.0 --port 8200 --data-dir /data/rlm --embedding-provider %(ENV_RLM_EMBEDDING_PROVIDER)s
autorestart=true
redirect_stderr=true
stdout_logfile=/data/logs/rlm.log
environment=RLM_EMBEDDING_PROVIDER="%(ENV_RLM_EMBEDDING_PROVIDER)s"

[program:jefest]
command=python -m jefest.server
directory=/app
autorestart=true
redirect_stderr=true
stdout_logfile=/data/logs/jefest.log
